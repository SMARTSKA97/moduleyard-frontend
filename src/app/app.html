<div
    class="min-h-screen flex flex-col bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">

    <div class="absolute top-4 right-4 z-50">
        <p-button [icon]="themeService.isDark() ? 'pi pi-sun' : 'pi pi-moon'" (onClick)="themeService.toggleTheme()"
            severity="secondary" [rounded]="true" [outlined]="true"
            styleClass="!rounded-full w-12 h-12 p-0 flex items-center justify-center bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-800 dark:text-white shadow-md hover:scale-110 transition-transform">
        </p-button>
    </div>

    <main class="flex-grow">
        <router-outlet></router-outlet>
    </main>


    <app-footer></app-footer>
</div>
