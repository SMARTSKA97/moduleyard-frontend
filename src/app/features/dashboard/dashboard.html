<div class="min-h-full w-full flex flex-col pt-24 px-4 sm:px-8 max-w-7xl mx-auto pb-12">

    <div
        class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 transition-colors duration-300">
        <div class="mb-4 sm:mb-0">
            <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight transition-colors">
                Command Center
            </h1>
            <p class="text-gray-600 dark:text-gray-400 mt-1 transition-colors">
                Select a module to begin your work.
            </p>
        </div>

        <button pButton
            class="flex items-center gap-2 bg-transparent hover:bg-red-50 dark:hover:bg-red-900/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-800 font-semibold py-2 px-4 rounded-lg transition-all shadow-sm"
            (click)="logout()">
            <i class="pi pi-sign-out"></i>
            <span>Secure Logout</span>
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        @for (mod of modules; track mod.title) {
        <p-card
            styleClass="h-full flex flex-col justify-between bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden">

            <div class="flex flex-col items-center text-center pt-4 pb-2">
                <div
                    class="w-16 h-16 flex items-center justify-center rounded-full bg-gray-50 dark:bg-gray-900 mb-4 transition-colors">
                    <i class="pi {{mod.icon}} text-3xl {{mod.color}}"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2 transition-colors">{{mod.title}}</h2>
                <p class="text-gray-600 dark:text-gray-400 text-sm transition-colors">{{mod.description}}</p>
            </div>

            <ng-template pTemplate="footer">
                <button pButton
                    class="w-full flex justify-center items-center gap-2 bg-gray-50 dark:bg-gray-700/50 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-600 font-semibold py-2.5 px-4 rounded-lg transition-all shadow-sm">
                    <span>Launch</span>
                    <i class="pi pi-arrow-right text-sm"></i>
                </button>
            </ng-template>

        </p-card>
        }

    </div>
</div>
